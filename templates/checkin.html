<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OSA Check-In Kiosk</title>
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --forest:#111111; --green:#1A1A1A; --green-mid:#B8952A;
    --green-light:#F9F4E8; --gold:#C9A84C;
    --text:#1A1814; --muted:#5A5750; --light:#8A8780;
    --border:#DDD9D0; --bg:#F5F2EC; --surface:#fff; --surface2:#F4F1EB;
    --success:#1A5A2A; --success-light:#E8F5EC; --success-border:#B8DCC4;
    --warn:#7A4A00; --warn-light:#FFF3DC;
    --danger:#7A1A1A; --danger-light:#FCEAEA;
    --radius:12px; --radius-lg:20px;
    --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
  .header { background: var(--forest); padding: 14px 24px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .header-logo { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); }
  .header-div { width: 1px; height: 18px; background: rgba(255,255,255,0.15); }
  .header-title { font-size: 15px; color: rgba(255,255,255,0.65); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .header-stats { display: flex; gap: 16px; }
  .hstat { text-align: center; }
  .hstat-val { font-size: 18px; font-weight: 700; color: #fff; font-family: 'Courier New', monospace; line-height: 1; }
  .hstat-val.green { color: #6FCF3A; }
  .hstat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.35); margin-top: 2px; }
  .clock { font-family: 'Courier New', monospace; font-size: 13px; color: rgba(255,255,255,0.4); }
  .stripe { height: 3px; background: linear-gradient(90deg,var(--gold) 0%,#e8c96a 50%,var(--gold) 100%); flex-shrink: 0; }
  .main { flex: 1; overflow-y: auto; display: flex; align-items: flex-start; justify-content: center; padding: 24px 20px 40px; }
  .wrap { width: 100%; max-width: 640px; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* SCAN SCREEN */
  .scan-card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); overflow: hidden; }
  .scan-top { background: var(--forest); padding: 26px 30px 22px; text-align: center; }
  .scan-top h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 5px; }
  .scan-top p { font-size: 14px; color: rgba(255,255,255,0.5); }
  .scan-body { padding: 26px 30px; }
  /* MODE TOGGLE */
  .mode-toggle { display: flex; gap: 6px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 4px; margin-bottom: 18px; }
  .mode-btn { flex: 1; padding: 10px 6px; background: transparent; border: none; border-radius: 7px; font-size: 13px; font-weight: 700; color: var(--muted); cursor: pointer; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: all 0.12s; }
  .mode-btn .mode-emoji { font-size: 18px; }
  .mode-btn:hover { color: var(--green); }
  .mode-btn.active { background: var(--surface); color: var(--green); box-shadow: var(--shadow); }
  .mode-hint { font-size: 12.5px; color: var(--muted); text-align: center; background: var(--green-light); border: 1px solid var(--success-border); border-radius: var(--radius); padding: 9px 12px; margin-bottom: 16px; line-height: 1.5; }
  .cam-toggle { width: 100%; padding: 13px; background: var(--surface2); border: 1.5px solid var(--border); color: var(--text); border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 18px; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: Arial, sans-serif; transition: all 0.12s; }
  .cam-toggle:hover { border-color: var(--green-mid); color: var(--green); }
  .cam-toggle.active { background: var(--danger-light); border-color: #E8B4B4; color: var(--danger); }
  .video-wrap { border-radius: var(--radius); overflow: hidden; background: #111; position: relative; margin-bottom: 18px; aspect-ratio: 4/3; max-height: 260px; display: none; }
  .video-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 52%; aspect-ratio: 1; position: relative; }
  .sc { position: absolute; width: 20px; height: 20px; border-color: #fff; border-style: solid; }
  .sc.tl { top:0;left:0;border-width:2.5px 0 0 2.5px;border-radius:3px 0 0 0; }
  .sc.tr { top:0;right:0;border-width:2.5px 2.5px 0 0;border-radius:0 3px 0 0; }
  .sc.bl { bottom:0;left:0;border-width:0 0 2.5px 2.5px;border-radius:0 0 0 3px; }
  .sc.br { bottom:0;right:0;border-width:0 2.5px 2.5px 0;border-radius:0 0 3px 0; }
  .scan-line { position: absolute; left:8%;right:8%;height:2px;background:rgba(111,207,58,0.7);animation: scanline 2s ease-in-out infinite; }
  @keyframes scanline { 0%,100%{top:8%}50%{top:92%} }
  .or-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .or-line { flex: 1; height: 1px; background: var(--border); }
  .or-text { font-size: 11px; font-weight: 700; color: var(--light); text-transform: uppercase; letter-spacing: 0.08em; }
  .id-input { width: 100%; padding: 16px 18px; border: 2px solid var(--border); border-radius: var(--radius); font-size: 18px; font-family: 'Courier New', monospace; color: var(--text); background: var(--surface); outline: none; text-align: center; letter-spacing: 0.04em; transition: border-color 0.15s; margin-bottom: 16px; }
  .id-input:focus { border-color: var(--green-mid); }
  .id-input::placeholder { font-family: Arial, sans-serif; font-size: 15px; letter-spacing: 0; color: var(--light); }
  .btn-lookup { width: 100%; padding: 16px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 700; cursor: pointer; font-family: Arial, sans-serif; transition: background 0.15s; }
  .btn-lookup:hover { background: var(--forest); }
  .lookup-error { background: var(--danger-light); border: 1px solid #E8B4B4; border-radius: var(--radius); padding: 12px 16px; font-size: 14px; color: var(--danger); text-align: center; margin-top: 14px; display: none; }
  .lookup-error.show { display: block; }
  .spinner-wrap { text-align: center; padding: 16px; display: none; }
  .spinner-wrap.show { display: block; }
  .spinner { display: inline-block; width: 26px; height: 26px; border: 3px solid var(--border); border-top-color: var(--green-mid); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* STUDENT CARD */
  .student-card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); overflow: hidden; }
  .student-head { padding: 20px 26px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); }
  .s-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--green-light); border: 2px solid var(--success-border); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--green); font-family: 'Courier New', monospace; flex-shrink: 0; }
  .s-name { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  .s-sub { font-size: 13px; color: var(--muted); }
  .s-badge { margin-left: auto; padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .s-badge.title { background: #FBF5E6; color: #8A6200; border: 1px solid #E8D498; }
  .s-badge.workshop { background: var(--green-light); color: var(--green); border: 1px solid #C0D9A0; }
  .s-badge.opening { background: #EEF0F8; color: #4A5080; border: 1px solid #C8CCDC; }
  .s-badge.both { background: #F0E8F8; color: #6A3080; border: 1px solid #D0B0E8; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .info-cell { padding: 12px 20px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
  .info-cell:nth-child(even) { border-right: none; }
  .info-cell:nth-last-child(-n+2) { border-bottom: none; }
  .info-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--light); margin-bottom: 3px; }
  .info-val { font-size: 14px; font-weight: 500; color: var(--text); }
  .info-val.mono { font-family: 'Courier New', monospace; font-size: 12px; background: var(--green-light); color: var(--green); padding: 2px 7px; border-radius: 4px; display: inline-block; }
  .info-val.empty { color: var(--light); font-style: italic; font-size: 13px; }
  /* HAND-OUT PANEL — what to give the student */
  .handout { margin: 0; padding: 18px 22px 20px; background: #FFFBEF; border-top: 2px solid var(--gold); border-bottom: 1px solid var(--border); }
  .handout-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: #8A6200; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
  .handout-list { display: flex; flex-direction: column; gap: 9px; }
  .handout-item { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 700; color: #1A1814; }
  .handout-item .ho-check { width: 26px; height: 26px; flex-shrink: 0; border-radius: 7px; background: #fff; border: 2px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--gold); }
  .handout-item .ho-size { margin-left: 6px; font-family: 'Courier New', monospace; font-size: 15px; font-weight: 700; background: var(--green); color: #fff; padding: 2px 10px; border-radius: 6px; }
  .handout-item.special { color: #6A3080; }
  .handout-item.special .ho-check { border-color: #6A3080; color: #6A3080; }
  /* On the success screen, a compact green version */
  .handout.done { background: var(--green-light); border-top-color: var(--success-border); border-radius: var(--radius); border-bottom: 1px solid var(--success-border); margin-bottom: 22px; text-align: left; }
  .handout.done .handout-title { color: var(--green); }
  .action-bar { padding: 18px 22px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
  .btn-back { padding: 16px 18px; background: var(--surface2); border: 1.5px solid var(--border); color: var(--muted); border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; font-family: Arial, sans-serif; }
  .btn-checkin { flex: 1; padding: 16px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 17px; font-weight: 700; cursor: pointer; font-family: Arial, sans-serif; transition: background 0.15s; }
  .btn-checkin:hover { background: var(--forest); }
  .btn-checkin:active { transform: scale(0.99); }

  /* SUCCESS */
  .success-card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 44px 32px; text-align: center; }
  .suc-icon { width: 76px; height: 76px; background: var(--success-light); border: 3px solid var(--success-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 34px; }
  .suc-name { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .suc-sub { font-size: 15px; color: var(--muted); margin-bottom: 4px; }
  .suc-time { font-family: 'Courier New', monospace; font-size: 12px; color: var(--light); margin-bottom: 24px; }
  .suc-details { background: var(--green-light); border: 1px solid var(--success-border); border-radius: var(--radius); padding: 14px 18px; text-align: left; margin-bottom: 22px; display: flex; flex-wrap: wrap; gap: 10px 22px; }
  .suc-detail strong { display: block; font-size: 14px; color: var(--text); }
  .suc-detail { font-size: 12px; color: var(--muted); }
  .btn-next { width: 100%; padding: 17px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700; cursor: pointer; font-family: Arial, sans-serif; transition: background 0.15s; }
  .btn-next:hover { background: var(--forest); }
  .suc-countdown { font-size: 13px; color: var(--light); margin-top: 10px; }

  /* ALREADY */
  .already-card { background: var(--surface); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); padding: 44px 32px; text-align: center; }
  .already-icon { font-size: 42px; margin-bottom: 14px; }
  .already-title { font-size: 22px; font-weight: 700; color: var(--warn); margin-bottom: 8px; }
  .already-sub { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
  .already-actions { display: flex; gap: 10px; }
  .btn-override { flex: 1; padding: 14px; background: var(--warn-light); border: 1.5px solid #EDD8A0; color: var(--warn); border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer; font-family: Arial, sans-serif; }
  .btn-ok { flex: 2; padding: 14px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; font-family: Arial, sans-serif; }

  @media (max-width: 500px) {
    .info-grid { grid-template-columns: 1fr; }
    .info-cell { border-right: none !important; }
    .info-cell:last-child { border-bottom: none; }
    .action-bar { flex-wrap: wrap; }
    .btn-checkin { flex: 100%; order: -1; }
    .scan-body, .scan-top { padding: 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <img src="/static/osa-logo.png" alt="On Stage America" style="height:30px;width:auto;filter:brightness(0) invert(1);">
  <div class="header-div"></div>
  <div class="header-title">Event Check-In</div>
  <div class="header-right">
    <div class="header-stats">
      <div class="hstat"><div class="hstat-val" id="stat-total">—</div><div class="hstat-label">Registered</div></div>
      <div class="hstat"><div class="hstat-val green" id="stat-in">0</div><div class="hstat-label">Checked In</div></div>
      <div class="hstat"><div class="hstat-val" id="stat-out">—</div><div class="hstat-label">Pending</div></div>
    </div>
    <div class="clock" id="clock">--:--</div>
    <a href="/checkin/logout" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);padding:6px 12px;border-radius:6px;font-size:12px;text-decoration:none;white-space:nowrap;">Sign Out</a>
  </div>
</div>
<div class="stripe"></div>

<div class="main">
  <div class="wrap">

    <!-- SCAN SCREEN -->
    <div class="screen active" id="screen-scan">
      <div class="scan-card">
        <div class="scan-top">
          <h1>Check In Student</h1>
          <p>Choose how you're scanning today</p>
        </div>
        <div class="scan-body">
          <div class="mode-toggle" id="mode-toggle">
            <button class="mode-btn" id="mode-camera"  onclick="setMode('camera')"><span class="mode-emoji">📷</span>Camera</button>
            <button class="mode-btn" id="mode-usb"     onclick="setMode('usb')"><span class="mode-emoji">⌨️</span>USB Scanner</button>
            <button class="mode-btn" id="mode-manual"  onclick="setMode('manual')"><span class="mode-emoji">✍️</span>Manual</button>
          </div>
          <div class="mode-hint" id="mode-hint"></div>
          <button class="cam-toggle" id="cam-btn" onclick="toggleCam()">📷 Start Camera</button>
          <div class="video-wrap" id="video-wrap">
            <video id="qr-video" autoplay muted playsinline></video>
            <div class="scan-overlay">
              <div class="scan-frame">
                <div class="sc tl"></div><div class="sc tr"></div>
                <div class="sc bl"></div><div class="sc br"></div>
                <div class="scan-line"></div>
              </div>
            </div>
          </div>
          <div class="or-row"><div class="or-line"></div><div class="or-text">or type ID</div><div class="or-line"></div></div>
          <input class="id-input" type="text" id="id-input" placeholder="Enter Confirmation ID…"
            autocomplete="off" autocorrect="off" spellcheck="false"
            onkeydown="if(event.key==='Enter')lookup()">
          <button class="btn-lookup" onclick="lookup()">Look Up Student</button>
          <div class="spinner-wrap" id="spinner"><div class="spinner"></div></div>
          <div class="lookup-error" id="lookup-error"></div>
        </div>
      </div>
    </div>

    <!-- STUDENT CARD -->
    <div class="screen" id="screen-student">
      <div class="student-card">
        <div class="student-head">
          <div class="s-avatar" id="s-avatar"></div>
          <div>
            <div class="s-name" id="s-name"></div>
            <div class="s-sub" id="s-sub"></div>
          </div>
          <div class="s-badge" id="s-badge"></div>
        </div>
        <div class="handout">
          <div class="handout-title">🎁 Hand the student</div>
          <div class="handout-list" id="handout-list"></div>
        </div>
        <div class="info-grid">
          <div class="info-cell"><div class="info-label">Studio</div><div class="info-val" id="s-studio"></div></div>
          <div class="info-cell"><div class="info-label">Gender</div><div class="info-val" id="s-gender"></div></div>
          <div class="info-cell"><div class="info-label">Email</div><div class="info-val" id="s-email"></div></div>
          <div class="info-cell"><div class="info-label">Phone</div><div class="info-val" id="s-phone"></div></div>
          <div class="info-cell" id="cell-routine" style="display:none;"><div class="info-label">Routine</div><div class="info-val" id="s-routine"></div></div>
          <div class="info-cell"><div class="info-label">T-Shirt</div><div class="info-val" id="s-shirt"></div></div>
          <div class="info-cell"><div class="info-label">Confirmation #</div><div class="info-val mono" id="s-id"></div></div>
          <div class="info-cell"><div class="info-label">Registered</div><div class="info-val" id="s-created"></div></div>
        </div>
        <div class="action-bar">
          <button class="btn-back" onclick="reset()">← Back</button>
          <button class="btn-checkin" onclick="doCheckin()">✓ Check In</button>
        </div>
      </div>
    </div>

    <!-- SUCCESS -->
    <div class="screen" id="screen-success">
      <div class="success-card">
        <div class="suc-icon">✓</div>
        <div class="suc-name" id="suc-name"></div>
        <div class="suc-sub">Successfully checked in</div>
        <div class="suc-time" id="suc-time"></div>
        <div class="handout done">
          <div class="handout-title">🎁 Hand the student</div>
          <div class="handout-list" id="suc-handout-list"></div>
        </div>
        <div class="suc-details" id="suc-details"></div>
        <button class="btn-next" onclick="reset()">✓ Next Student</button>
        <div class="suc-countdown" id="countdown"></div>
      </div>
    </div>

    <!-- ALREADY CHECKED IN -->
    <div class="screen" id="screen-already">
      <div class="already-card">
        <div class="already-icon">⚠️</div>
        <div class="already-title">Already Checked In</div>
        <div class="already-sub" id="already-msg"></div>
        <div class="already-actions">
          <button class="btn-override" onclick="showStudent()">Override / Re-check</button>
          <button class="btn-ok" onclick="reset()">← Next Student</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  let currentReg = null;
  let camActive  = false;
  let camStream  = null;
  let camRaf     = null;
  let autoTimer  = null;
  let scanMode   = 'usb';   // 'camera' | 'usb' | 'manual' — per-device, see setMode()
  let refocusTimer = null;

  // ── SCAN MODE (camera / USB scanner / manual) ──
  const MODE_HINTS = {
    camera: '📷 Point the laptop camera at the student\'s QR code.',
    usb:    '⌨️ Scan with the handheld USB scanner — the code lands in the box and checks in automatically. Keep this window focused.',
    manual: '✍️ Type the Confirmation ID and press Enter or Look Up Student.',
  };

  function setMode(mode, save = true) {
    if (!['camera','usb','manual'].includes(mode)) mode = 'usb';
    scanMode = mode;
    if (save) { try { localStorage.setItem('checkinMode', mode); } catch(e){} }

    // Toggle button highlight
    ['camera','usb','manual'].forEach(m =>
      document.getElementById('mode-' + m).classList.toggle('active', m === mode));
    document.getElementById('mode-hint').textContent = MODE_HINTS[mode];

    // Camera button + video only relevant in camera mode
    const camBtn = document.getElementById('cam-btn');
    camBtn.style.display = (mode === 'camera') ? 'flex' : 'none';
    if (mode !== 'camera') stopCam();

    // USB scanner & manual both rely on the text input; USB also needs the
    // field to stay focused so scanned keystrokes always land there.
    stopRefocus();
    if (mode === 'usb') startRefocus();
    focusInput();
  }

  function focusInput() {
    const el = document.getElementById('id-input');
    // Only steal focus while the scan screen is visible.
    if (el && document.getElementById('screen-scan').classList.contains('active')) {
      setTimeout(() => el.focus(), 50);
    }
  }

  // In USB mode, if focus drifts off the input (a stray click), pull it back so
  // the next scan isn't lost. Runs only while the scan screen is active.
  function startRefocus() {
    stopRefocus();
    refocusTimer = setInterval(() => {
      if (scanMode !== 'usb') return;
      const scan = document.getElementById('screen-scan');
      const el   = document.getElementById('id-input');
      if (scan.classList.contains('active') && document.activeElement !== el) el.focus();
    }, 600);
  }
  function stopRefocus() {
    if (refocusTimer) { clearInterval(refocusTimer); refocusTimer = null; }
  }

  // Clock
  setInterval(() => {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }, 1000);

  // Stats
  async function loadStats() {
    try {
      const res  = await fetch('/checkin/stats');
      const data = await res.json();
      document.getElementById('stat-total').textContent = data.total;
      document.getElementById('stat-in').textContent    = data.checked_in;
      document.getElementById('stat-out').textContent   = data.pending;
    } catch(e) {}
  }
  loadStats();
  setInterval(loadStats, 15000);

  // ── LOOKUP ──
  async function lookup() {
    let raw = document.getElementById('id-input').value.trim();
    if (!raw) return;
    // Extract UUID from full confirmation URL
    if (raw.includes('/confirm/')) raw = raw.split('/confirm/').pop().split('/')[0];
    // Legacy CHECKIN:uuid format
    else if (raw.toUpperCase().startsWith('CHECKIN:')) raw = raw.split(':')[1];
    raw = raw.replace(/[^a-zA-Z0-9-]/g, '');
    if (!raw) return;

    setError('');
    document.getElementById('spinner').classList.add('show');

    try {
      const res  = await fetch('/checkin/lookup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: raw })
      });
      const data = await res.json();
      document.getElementById('spinner').classList.remove('show');

      if (!res.ok) { setError(data.error || 'Not found'); return; }

      currentReg = data.registration;
      stopCam();

      if (currentReg.checked_in) {
        document.getElementById('already-msg').innerHTML =
          `<strong>${currentReg.full_name}</strong> was already checked in at <strong>${currentReg.checkin_time}</strong> on ${currentReg.checkin_date}.<br>Override or go back?`;
        showScreen('screen-already');
      } else {
        showStudent();
      }
    } catch(e) {
      document.getElementById('spinner').classList.remove('show');
      setError('Network error. Please try again.');
    }
  }

  // ── HAND-OUT ITEMS ──
  // What to physically give the student, by registration type:
  //   Workshop Only          → Workshop Wristband
  //   Opening Number Only     → Opening Number Wristband + T-shirt
  //   Workshop & Opening      → Workshop + Opening Number Wristbands + T-shirt
  //   Title                   → both Wristbands + T-shirt + Title Audition Info Package
  function handoutItems(r) {
    const items = [];
    const size  = r.tshirt_size || '';
    const shirt = () => items.push({ label: 'T-Shirt', size: size || 'size not on file', missing: !size });

    if (r.is_title) {
      items.push({ label: 'Workshop Wristband' });
      items.push({ label: 'Opening Number Wristband' });
      shirt();
      items.push({ label: 'Title Audition Information Package', special: true });
    } else if (r.reg_type === 'both') {
      items.push({ label: 'Workshop Wristband' });
      items.push({ label: 'Opening Number Wristband' });
      shirt();
    } else if (r.reg_type === 'opening') {
      items.push({ label: 'Opening Number Wristband' });
      shirt();
    } else { // workshop (or unknown → default to workshop)
      items.push({ label: 'Workshop Wristband' });
    }
    return items;
  }

  function renderHandout(targetId, r) {
    const list = document.getElementById(targetId);
    list.innerHTML = handoutItems(r).map(it => {
      const sizeTag = it.size
        ? `<span class="ho-size"${it.missing ? ' style="background:#B42828;"' : ''}>${it.size}</span>`
        : '';
      return `<div class="handout-item${it.special ? ' special' : ''}">
                <span class="ho-check">✓</span>
                <span>${it.label}${sizeTag}</span>
              </div>`;
    }).join('');
  }

  // ── SHOW STUDENT ──
  function showStudent() {
    if (!currentReg) return;
    const r = currentReg;
    document.getElementById('s-avatar').textContent = (r.full_name||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
    document.getElementById('s-name').textContent   = r.full_name;
    document.getElementById('s-sub').textContent    = r.studio_name || '';
    document.getElementById('s-studio').textContent = r.studio_name || '—';
    document.getElementById('s-gender').textContent = r.gender || '—';
    document.getElementById('s-email').textContent  = r.email || '—';
    document.getElementById('s-phone').textContent  = r.phone || '—';
    document.getElementById('s-shirt').textContent  = r.tshirt_size || '—';
    document.getElementById('s-id').textContent     = r.id;
    document.getElementById('s-created').textContent = r.created_at || '—';

    const routineCell = document.getElementById('cell-routine');
    if (r.is_title && r.routine_name) {
      document.getElementById('s-routine').textContent = r.routine_name;
      routineCell.style.display = '';
    } else { routineCell.style.display = 'none'; }

    // Badge
    const badge = document.getElementById('s-badge');
    if (r.is_title) { badge.textContent = '⭐ Title'; badge.className = 's-badge title'; }
    else if (r.reg_type === 'both') { badge.textContent = 'Workshop & Opening'; badge.className = 's-badge both'; }
    else if (r.reg_type === 'opening') { badge.textContent = 'Opening Number'; badge.className = 's-badge opening'; }
    else { badge.textContent = 'Workshop Only'; badge.className = 's-badge workshop'; }

    renderHandout('handout-list', r);

    showScreen('screen-student');
  }

  // ── CHECK IN ──
  async function doCheckin() {
    if (!currentReg) return;
    try {
      const res  = await fetch('/checkin/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: currentReg.id })
      });
      const data = await res.json();
      if (data.already) {
        document.getElementById('already-msg').innerHTML =
          `Already checked in at <strong>${data.checkin_time}</strong>. Override?`;
        showScreen('screen-already'); return;
      }
      if (data.success) {
        const r = data.registration;
        document.getElementById('suc-name').textContent = r.full_name;
        document.getElementById('suc-time').textContent = `${r.checkin_time} · ${r.checkin_date}`;
        renderHandout('suc-handout-list', r);
        const details = [
          r.studio_name ? `<div class="suc-detail"><strong>${r.studio_name}</strong>Studio</div>` : '',
          `<div class="suc-detail"><strong>${r.reg_label}</strong>Registration</div>`,
          r.tshirt_size ? `<div class="suc-detail"><strong>${r.tshirt_size}</strong>T-Shirt</div>` : '',
        ].filter(Boolean).join('');
        document.getElementById('suc-details').innerHTML = details;
        showScreen('screen-success');
        loadStats();
        startCountdown();
      }
    } catch(e) { alert('Error processing check-in. Please try again.'); }
  }

  function startCountdown() {
    if (autoTimer) clearInterval(autoTimer);
    let s = 8;
    const cd = document.getElementById('countdown');
    autoTimer = setInterval(() => {
      s--;
      cd.textContent = `Returning to scan screen in ${s}s…`;
      if (s <= 0) { clearInterval(autoTimer); reset(); }
    }, 1000);
    cd.textContent = `Returning to scan screen in ${s}s…`;
  }

  // ── CAMERA (ZXing) ──
  let zxingReader = null;

  async function toggleCam() { camActive ? stopCam() : await startCam(); }

  async function startCam() {
    const btn   = document.getElementById('cam-btn');
    const wrap  = document.getElementById('video-wrap');
    const video = document.getElementById('qr-video');
    try {
      zxingReader = new ZXing.BrowserMultiFormatReader();
      const devices = await zxingReader.listVideoInputDevices();
      // Prefer rear/environment camera on mobile
      const device = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length - 1];
      const deviceId = device ? device.deviceId : undefined;

      wrap.style.display = 'block';
      camActive = true;
      btn.textContent = '✕ Stop Camera';
      btn.classList.add('active');

      let lastCode = '';
      zxingReader.decodeFromVideoDevice(deviceId, video, (result, err) => {
        if (result) {
          const text = result.getText();
          if (text && text !== lastCode) {
            lastCode = text;
            let sid = text.trim();
            if (sid.includes('/confirm/')) sid = sid.split('/confirm/').pop().split('/')[0];
            else if (sid.toUpperCase().startsWith('CHECKIN:')) sid = sid.split(':')[1];
            document.getElementById('id-input').value = sid;
            lookup();
            setTimeout(() => { lastCode = ''; }, 4000);
          }
        }
      });
    } catch(e) {
      setError('Camera unavailable: ' + (e.message || 'Please check browser permissions.'));
      stopCam();
    }
  }

  function stopCam() {
    camActive = false;
    if (zxingReader) { zxingReader.reset(); zxingReader = null; }
    const btn  = document.getElementById('cam-btn');
    const wrap = document.getElementById('video-wrap');
    if (btn)  { btn.textContent = '📷 Start Camera'; btn.classList.remove('active'); }
    if (wrap) wrap.style.display = 'none';
    camStream = null;
  }

  // ── UTILS ──
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
  function setError(msg) {
    const el = document.getElementById('lookup-error');
    if (msg) { el.textContent = msg; el.classList.add('show'); }
    else     { el.classList.remove('show'); }
  }
  function reset() {
    if (autoTimer) clearInterval(autoTimer);
    currentReg = null;
    document.getElementById('id-input').value = '';
    setError('');
    document.getElementById('spinner').classList.remove('show');
    showScreen('screen-scan');
    // Back on the scan screen: restore the chosen mode's focus/refocus behaviour.
    if (scanMode === 'usb') startRefocus();
    focusInput();
  }

  window.addEventListener('load', () => {
    let saved = 'usb';
    try { saved = localStorage.getItem('checkinMode') || 'usb'; } catch(e){}
    setMode(saved, false);   // applies hint, focus, and refocus for the saved mode
  });
</script>
</body>
